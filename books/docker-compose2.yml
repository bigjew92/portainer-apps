version: '3.8'

services:
  app:
    image: akiraslingshot/bookkeep:latest
    container_name: bookkeep
    environment:
      DATABASE_URL: postgresql://bookkeep:bookkeep_password@db:5432/bookkeep_db
      HARDCOVER_API_TOKEN: ${HARDCOVER_API_TOKEN:-}
      REDIS_URL: redis://redis:6379/0
      # BOOKKEEP_SECRET_KEY: ${BOOKKEEP_SECRET_KEY:-}
    volumes:
      # Mount host download directories so Bookkeep can access completed downloads.
      # Adjust the left side (host path) to match your download client's output directory.
      - /volume1/docker/qbit/data/manual/complete:/downloads
      # Example: separate mounts for different media types
      - /volume1/docker/books/ebooks:/books
      - /volume1/docker/books/audiobooks:/audiobooks
    ports:
      - "14478:8000"
    depends_on:
      db:
        condition: service_healthy
      db-init:
        condition: service_completed_successfully
      redis:
        condition: service_started
    restart: unless-stopped

  db:
    image: postgres:16-alpine
    container_name: bookkeep-db
    environment:
      POSTGRES_DB: bookkeep_db
      POSTGRES_USER: bookkeep
      POSTGRES_PASSWORD: bookkeep_password
    ports:
      - "5434:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bookkeep -d bookkeep_db"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  db-init:
    image: postgres:16-alpine
    container_name: bookkeep-db-init
    depends_on:
      db:
        condition: service_healthy
    environment:
      PGPASSWORD: bookkeep_password
    command: >
      psql -h db -U bookkeep -d bookkeep_db -c "
        CREATE TABLE IF NOT EXISTS users (
          id SERIAL PRIMARY KEY, email VARCHAR UNIQUE NOT NULL, username VARCHAR UNIQUE NOT NULL,
          hashed_password VARCHAR, full_name VARCHAR, oidc_subject VARCHAR UNIQUE,
          is_active BOOLEAN DEFAULT TRUE, is_admin BOOLEAN DEFAULT FALSE,
          can_request_ebook BOOLEAN DEFAULT TRUE, can_request_audiobook BOOLEAN DEFAULT TRUE,
          can_download BOOLEAN DEFAULT TRUE, auto_approve_ebooks BOOLEAN DEFAULT TRUE,
          auto_approve_audiobooks BOOLEAN DEFAULT TRUE,
          created_at TIMESTAMPTZ DEFAULT NOW(), updated_at TIMESTAMPTZ
        );
        CREATE TABLE IF NOT EXISTS series (
          id SERIAL PRIMARY KEY, hardcover_id INTEGER UNIQUE NOT NULL,
          name VARCHAR NOT NULL, books_count INTEGER, is_seed_data BOOLEAN DEFAULT FALSE,
          last_refreshed TIMESTAMPTZ, created_at TIMESTAMPTZ DEFAULT NOW(), updated_at TIMESTAMPTZ
        );
        ALTER TABLE series ADD COLUMN IF NOT EXISTS last_refreshed TIMESTAMPTZ;
        ALTER TABLE series ADD COLUMN IF NOT EXISTS created_at TIMESTAMPTZ DEFAULT NOW();
        ALTER TABLE series ADD COLUMN IF NOT EXISTS updated_at TIMESTAMPTZ;
        CREATE TABLE IF NOT EXISTS books (
          id SERIAL PRIMARY KEY, title VARCHAR NOT NULL, author VARCHAR NOT NULL,
          author_id INTEGER, isbn VARCHAR UNIQUE, description TEXT, cover_url VARCHAR,
          genre VARCHAR, published_date VARCHAR, rating FLOAT, page_count INTEGER,
          hardcover_id INTEGER UNIQUE, hardcover_slug VARCHAR, booklore_id INTEGER UNIQUE,
          booklore_added_on TIMESTAMPTZ, audiobookshelf_id VARCHAR UNIQUE,
          default_edition_id INTEGER, default_physical_edition_id INTEGER,
          default_ebook_edition_id INTEGER, default_audio_edition_id INTEGER,
          series VARCHAR, series_id INTEGER, series_position FLOAT, genres VARCHAR,
          ratings_count INTEGER, users_count INTEGER, activities_count INTEGER,
          release_year INTEGER, is_seed_data BOOLEAN DEFAULT FALSE,
          ebook_available BOOLEAN DEFAULT FALSE, audiobook_available BOOLEAN DEFAULT FALSE,
          last_refreshed TIMESTAMPTZ, downloaded_release_hashes TEXT,
          created_at TIMESTAMPTZ DEFAULT NOW(), updated_at TIMESTAMPTZ
        );
        CREATE TABLE IF NOT EXISTS book_requests (
          id SERIAL PRIMARY KEY, book_id INTEGER NOT NULL REFERENCES books(id),
          user_id INTEGER NOT NULL REFERENCES users(id), format VARCHAR NOT NULL,
          status VARCHAR DEFAULT 'pending', source VARCHAR DEFAULT 'user_request',
          notes TEXT, admin_notes TEXT, readarr_book_id INTEGER, edition_id INTEGER,
          readarr_received BOOLEAN DEFAULT FALSE NOT NULL, readarr_search_triggered BOOLEAN,
          readarr_search_status_code INTEGER, readarr_message TEXT,
          created_at TIMESTAMPTZ DEFAULT NOW(), updated_at TIMESTAMPTZ
        );
        CREATE TABLE IF NOT EXISTS app_settings (
          id SERIAL PRIMARY KEY, key VARCHAR UNIQUE NOT NULL, value TEXT,
          source VARCHAR DEFAULT 'ui' NOT NULL,
          created_at TIMESTAMPTZ DEFAULT NOW(), updated_at TIMESTAMPTZ
        );
        CREATE TABLE IF NOT EXISTS readarr_servers (
          id SERIAL PRIMARY KEY, name VARCHAR NOT NULL, hostname VARCHAR NOT NULL,
          port INTEGER DEFAULT 8787 NOT NULL, use_ssl BOOLEAN DEFAULT FALSE,
          api_key VARCHAR NOT NULL, url_base VARCHAR, is_default BOOLEAN DEFAULT FALSE,
          is_audiobook BOOLEAN DEFAULT FALSE, ebook_quality_profile_id INTEGER,
          ebook_root_folder VARCHAR, ebook_tags VARCHAR, audiobook_quality_profile_id INTEGER,
          audiobook_root_folder VARCHAR, audiobook_tags VARCHAR,
          created_at TIMESTAMPTZ DEFAULT NOW(), updated_at TIMESTAMPTZ
        );
        CREATE TABLE IF NOT EXISTS booklore_servers (
          id SERIAL PRIMARY KEY, name VARCHAR NOT NULL, url VARCHAR NOT NULL,
          username VARCHAR NOT NULL, password VARCHAR NOT NULL, is_default BOOLEAN DEFAULT FALSE,
          ebook_library_id INTEGER, audiobook_library_id INTEGER,
          access_token TEXT, refresh_token TEXT, token_expires_at TIMESTAMPTZ,
          created_at TIMESTAMPTZ DEFAULT NOW(), updated_at TIMESTAMPTZ
        );
        CREATE TABLE IF NOT EXISTS audiobookshelf_servers (
          id SERIAL PRIMARY KEY, name VARCHAR NOT NULL, url VARCHAR NOT NULL,
          api_key VARCHAR NOT NULL, is_default BOOLEAN DEFAULT FALSE, library_id VARCHAR,
          created_at TIMESTAMPTZ DEFAULT NOW(), updated_at TIMESTAMPTZ
        );
        CREATE TABLE IF NOT EXISTS job_schedules (
          id SERIAL PRIMARY KEY, job_name VARCHAR UNIQUE NOT NULL,
          interval_seconds INTEGER NOT NULL, last_execution TIMESTAMPTZ,
          next_execution TIMESTAMPTZ, is_enabled BOOLEAN DEFAULT TRUE, state_json TEXT,
          created_at TIMESTAMPTZ DEFAULT NOW(), updated_at TIMESTAMPTZ
        );
        CREATE TABLE IF NOT EXISTS download_clients (
          id SERIAL PRIMARY KEY, name VARCHAR UNIQUE NOT NULL, type VARCHAR NOT NULL,
          protocol VARCHAR NOT NULL, host VARCHAR NOT NULL, port INTEGER NOT NULL,
          use_ssl BOOLEAN DEFAULT FALSE, username VARCHAR, password VARCHAR,
          api_key VARCHAR, url_base VARCHAR, enabled BOOLEAN DEFAULT TRUE,
          priority INTEGER DEFAULT 0, category VARCHAR, ebook_category VARCHAR,
          audiobook_category VARCHAR, path_mappings_json TEXT,
          created_at TIMESTAMPTZ DEFAULT NOW(), updated_at TIMESTAMPTZ
        );
        CREATE TABLE IF NOT EXISTS prowlarr_servers (
          id SERIAL PRIMARY KEY, name VARCHAR UNIQUE NOT NULL, host VARCHAR NOT NULL,
          port INTEGER DEFAULT 9696 NOT NULL, use_ssl BOOLEAN DEFAULT FALSE,
          api_key VARCHAR NOT NULL, url_base VARCHAR, enabled BOOLEAN DEFAULT TRUE,
          is_default BOOLEAN DEFAULT FALSE, indexer_ids_json TEXT,
          created_at TIMESTAMPTZ DEFAULT NOW(), updated_at TIMESTAMPTZ
        );
        CREATE TABLE IF NOT EXISTS download_tasks (
          id SERIAL PRIMARY KEY, book_id INTEGER NOT NULL REFERENCES books(id),
          format VARCHAR NOT NULL, source VARCHAR NOT NULL, release_title VARCHAR,
          download_url VARCHAR, protocol VARCHAR, indexer VARCHAR, indexer_id INTEGER,
          size_bytes BIGINT, state VARCHAR DEFAULT 'queued' NOT NULL, progress FLOAT DEFAULT 0.0,
          download_speed FLOAT, created_at TIMESTAMPTZ DEFAULT NOW(), updated_at TIMESTAMPTZ
        );
      "
    restart: on-failure

  redis:
    image: redis:7-alpine
    container_name: bookkeep-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped
  # Optional: FlareSolverr for direct downloads (solves DDoS-Guard challenges)
  # flaresolverr:
  #   image: ghcr.io/flaresolverr/flaresolverr:latest
  #   container_name: bookkeep-flaresolverr
  #   environment:
  #     LOG_LEVEL: info
  #   ports:
  #     - "8191:8191"
  #   restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
