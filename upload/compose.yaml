version: "3.8"
services:
  upload-assistant:
    image: ghcr.io/audionut/upload-assistant:latest
    container_name: upload-assistant
    restart: unless-stopped
    command: ["--webui", "0.0.0.0:5000"]
    environment:
      - PUID=1026  # Your Synology User ID
      - PGID=100   # Your Synology Group ID
      - TZ=America/Los_Angeles
      # Required for the Docker GUI file browser to work:
      - UA_BROWSE_ROOTS=/data/movies,/data/tv,/Upload-Assistant/tmp
    ports:
      - "8085:5000" # Access via http://NAS-IP:8085
    volumes:
      # Map your actual media/torrent folder here
      - /volume1/movies:/data/movies:rw
      - /volume1/tv:/data/tv:rw
      # App data and config (auto-generated on first run)
      - /volume1/docker/uploads/data:/Upload-Assistant/data:rw
      - /volume1/docker/uploads/tmp:/Upload-Assistant/tmp:rw
      - /volume1/docker/uploads/webui-auth:/root/.config/upload-assistant:rw
    stop_grace_period: 15s
