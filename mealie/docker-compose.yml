services:
  mealie:
    image: ghcr.io/mealie-recipes/mealie:v2.5.0
    container_name: mealie
    restart: always
    ports:
        - "9925:9000" 
    deploy:
      resources:
        limits:
          memory: 1000M 
    volumes:
      - /volume1/docker/mealie/data:/app/data/
    environment:
      # Set Backend ENV Variables Here
      ALLOW_SIGNUP: "false"
      PUID: 1000
      PGID: 1000
      TZ: America/Los_Angeles
      BASE_URL: https://mealie.alexjsimon.com
      # Database Settings
      DB_ENGINE: postgres
      POSTGRES_USER: mealie
      POSTGRES_PASSWORD: mealie
      POSTGRES_SERVER: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: mealie
      # Email Settings
      SMTP_HOST: smtp.gmail.com
      SMTP_PORT: 587
      SMTP_FROM_NAME: Mealie
      SMTP_FROM_EMAIL: noreply@alex-mealie.com
      SMTP_USER: yaimalex@gmail.com
      SMTP_PASSWORD: "txrd ukxs dgfs kisz"
      # AI Settings
      OPENAI_BASE_URL: https://generativelanguage.googleapis.com/v1beta/openai/
      OPENAI_API_KEY: AIzaSyC8mCdH-FqIkMV5Nawcc0arBkRBpqUrrJM
      OPENAI_MODEL: gemini-2.0-flash-exp
    depends_on:
      postgres:
        condition: service_healthy

  postgres:
    container_name: postgres
    image: postgres:15
    restart: always
    volumes:
      - /volume1/docker/mealie/db:/var/lib/postgresql/data
    environment:
      POSTGRES_PASSWORD: mealie
      POSTGRES_USER: mealie
      PGUSER: mealie
    healthcheck:
      test: ["CMD", "pg_isready"]
      interval: 30s
      timeout: 20s
      retries: 3